<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Terkirim</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Background gambar */
            background: url('TKJ.jpg') no-repeat center center/cover;
            font-family: Arial, sans-serif;
            position: relative;
        }
        /* Optional: efek gelap biar teks lebih jelas */
        
        .box {
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            position: relative;
            z-index: 1;
            /* Background transparan */
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        /* Biar teks jelas */
        
        h2 {
            color: #00ff88;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }
        
        p {
            color: white;
            text-shadow: 2px 2px 6px rgba(0, 0, 0, 0.8);
        }
        
        .box {
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }
        
        .btn-custom {
            margin: 10px;
            border-radius: 25px;
            padding: 10px 20px;
        }
        
        .btn-primary {
            background-color: red;
            border: none;
        }
        
        .btn-secondary {
            background-color: #6c757d;
            border: none;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2 class="mb-3 text-success">Pesan Berhasil Dikirim!</h2>
        <p class="mb-4;color:green;">Terima kasih sudah menghubungi kami 😊</p>

        <!-- Tombol -->
        <a href="contak.html" class="btn btn-primary btn-custom">Kirim Pesan Lagi</a>
        <a href="index.html" class="btn btn-secondary btn-custom">Kembali ke Home</a>
    </div>

</body>

</html>
