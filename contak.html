<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-5">

    <div class="container">
        <h2>Kontak Kami</h2>
        <form id="contactForm">
            <div class="mb-3">
                <input type="text" name="nama" class="form-control" placeholder="Nama" required>
            </div>
            <div class="mb-3">
                <input type="text" name="telepon" class="form-control" placeholder="Telepon" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <textarea name="pesan" class="form-control" rows="4" placeholder="Pesan"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Kirim</button>
        </form>
    </div>

    <script>
        const scriptURL = "PASTE_URL_WEB_APP_DISINI";
        const form = document.getElementById("contactForm");

        form.addEventListener("submit", e => {
            e.preventDefault();

            fetch(scriptURL, {
                    method: "POST",
                    body: new FormData(form)
                })
                .then(response => response.text())
                .then(text => {
                    console.log("Response dari Apps Script:", text);
                    alert("Pesan berhasil dikirim!");
                    form.reset();
                })
                .catch(err => {
                    console.error("Error:", err);
                    alert("Gagal mengirim pesan. Cek console untuk detail.");
                });
        });
    </script>

</body>

</html>
